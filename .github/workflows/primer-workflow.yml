name: Practica Variables

on:
  push:

env:
  EMPRESA: OpenAI

jobs:

  variables:

    runs-on: ubuntu-latest

    env:
      LENGUAJE: GitHub Actions

    steps:

      - name: Variable del Workflow
        run: 'echo "Empresa: $EMPRESA"'

      - name: Variable del Job
        run: 'echo "Lenguaje: $LENGUAJE"'

      - name: Variable del Step
        env:
          MENSAJE: Hola desde el Step

        run: echo "$MENSAJE"

      - name: Contexto GitHub
        run: 'echo "Actor: ${{ github.actor }}"'

      - name: Mezclando Contexto y Variables
        env:
          USUARIO: ${{ github.actor }}

        run: echo "Hola $USUARIO"