name: Practica Matrix

on:
  push:

jobs:

  prueba-matrix:

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:

      - name: Mostrar sistema solicitado
        run: echo "Matrix pidió: ${{ matrix.os }}"

      - name: Mostrar sistema real
        run: echo "Runner está usando: ${{ runner.os }}"