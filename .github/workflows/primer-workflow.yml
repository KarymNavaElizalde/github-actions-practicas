name: Practica Condiciones

on:
  push:

jobs:

  condiciones:

    runs-on: ubuntu-latest

    steps:

      - name: Siempre se ejecuta
        run: |
          echo "Paso 1"

      - name: Solo en main
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Estoy en la rama main"

      - name: Solo si NO es main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "No estoy en main"

      - name: Mostrar rama
        run: |
          echo "${{ github.ref }}"