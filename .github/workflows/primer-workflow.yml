name: Practica Contextos

on:
  push:

jobs:

  explorar-contextos:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Actor
        run: echo "${{ github.actor }}"

      - name: Repositorio
        run: echo "${{ github.repository }}"

      - name: Rama
        run: echo "${{ github.ref }}"

      - name: Commit
        run: echo "${{ github.sha }}"

      - name: Workflow
        run: echo "${{ github.workflow }}"

      - name: Job
        run: echo "${{ github.job }}"

      - name: Run ID
        run: echo "${{ github.run_id }}"

      - name: Run Number
        run: echo "${{ github.run_number }}"

      - name: Sistema Operativo
        run: echo "${{ runner.os }}"